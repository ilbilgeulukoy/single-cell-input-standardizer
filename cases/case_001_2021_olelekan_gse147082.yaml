  download_url: "https://www.ncbi.nlm.nih.gov/geo/download/?acc=GSE147082&format=file"
  archive_file: GSE147082_RAW.tar
  raw_file_policy: temporary_download_and_delete_after_processing

raw_files_detected:
  - GSM4416534_PT-3232.csv.gz
  - GSM4416535_PT-5150.csv.gz
  - GSM4416536_PT-6885.csv.gz
  - GSM4416537_PT-4806.csv.gz
  - GSM4416538_PT-3401.csv.gz
  - GSM4416539_PT-2834.csv.gz

detected_input_format:
  format_label: compressed_csv_count_tables
  standard_10x_matrix_market: false
  standard_10x_h5: false
  existing_h5ad: false
  custom_count_table: true

raw_table_structure:
  first_column_name: Unnamed: 0
  first_column_interpretation: gene_symbol
  remaining_columns_interpretation: cell_barcodes
  raw_orientation: genes_x_cells
  required_transpose_for_anndata: true
  anndata_constructor: AnnData(df.T)

