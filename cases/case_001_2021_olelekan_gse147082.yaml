metadata_strategy:
  type: manually_curated_sample_level_metadata_from_GEO
  sample_id_source: GSM accession from filename
  patient_id_source: filename and GEO metadata
  metadata_expansion: sample-level metadata added to every cell in adata.obs
  obs_columns:
    - sample_id
    - patient_id
    - dataset_id
    - cancer_type
    - tumor_site
    - metastasis_site
    - tumor_treatment
    - cancer_site_origin
    - tumour_grade
    - tumour_stage
    - histological_subtype
    - patient_ethnicity
    - source_file
    - paper_id
    - geo_accession

var_strategy:
  var_names_source: gene symbols from first CSV column
  var_columns:
    - gene_symbol

gene_alignment_strategy:
  method: common_gene_intersection
  reason: samples had different gene sets
  genes_in_first_sample: 19297
  common_genes_across_all_samples: 16041
  concat_join: inner

final_output:
  file: data/case_001_2021_olelekan/outputs/2021_Olelekan_GSE147082_standardized.h5ad
  final_shape: "9885 cells x 16041 genes"
  n_obs: 9885
  n_vars: 16041
  n_samples: 6
  raw_files_deleted_after_processing: true

validation:
  nan_in_sample_X: false
  nan_in_combined_X: false
  nan_in_obs: false
  nan_in_var: false
  final_var_gene_symbol_restored_after_concat: true

standardization_recipe:
  - Download GSE147082_RAW.tar from GEO.
  - Extract the temporary TAR archive.
  - Detect GSM-level compressed CSV count tables.
  - Inspect the first CSV file.
  - Identify the first column as gene symbols.
  - Identify remaining columns as cell barcodes.
  - Interpret raw matrix orientation as genes x cells.
  - Rename the first column to gene.
  - Set gene as dataframe index.
  - Create AnnData using AnnData(df.T).
  - Assign obs_names from cell barcode columns.
  - Assign var_names from gene index.
  - Add gene_symbol to adata.var.
  - Add sample-level GEO metadata to adata.obs.
  - Build one AnnData object per sample.
  - Check NaN values in X, obs, and var.
  - Align all samples to common genes.
  - Concatenate sample AnnData objects along cells.
  - Restore gene_symbol in final adata.var.
  - Write standardized h5ad output.
  - Delete raw TAR and CSV.gz files from local storage.

potential_risks:
  - The files are not in standard 10x Matrix Market format.
  - Metadata is not provided as a clean cell-level table.
  - Manual GEO metadata curation is required.
  - Matrix orientation must be checked before AnnData creation.
  - Gene sets differ across samples, requiring common-gene alignment before concatenation.
  - var metadata can be dropped during anndata.concat if not explicitly restored.
