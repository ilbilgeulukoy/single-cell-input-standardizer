gene_table_strategy:
  accepted_gene_table_variants:
    - features.tsv.gz
    - genes.tsv.gz
  detected_gene_table_variant: genes.tsv.gz
  rule: use column 1 as gene symbol if present, otherwise column 0

barcode_strategy:
  required: true
  rule: read barcodes.tsv.gz explicitly and assign real cell barcodes to obs_names before adding GSM prefix

gene_deduplication_strategy:
  required: true
  duplicated_gene_symbols_detected: true
  duplicated_gene_symbols_first_sample: 20
  preferred_method: sparse_aggregation_matrix
  avoid_method: dense_pandas_toarray_groupby

gene_mapping_strategy:
  required: true
  previous_custom_component: SampleGeneMapGenerator
  reusable_module_needed: src/gene_mapping_and_deduplication.py

standardization_recipe:
  - Download GSE184880_RAW.tar from GEO.
  - Extract temporary Matrix Market files.
  - Filter files to keep only Cancer samples.
  - Group matrix, genes and barcodes files by GSM accession.
  - Support dot-separated role patterns such as .matrix. .genes. and .barcodes.
  - Validate that each selected GSM has one matrix, one genes/features table and one barcodes file.
  - Read matrix.mtx.gz as sparse Matrix Market.
  - Read barcodes.tsv.gz explicitly.
  - Read genes.tsv.gz as the gene table.
  - Detect matrix orientation as genes x cells.
  - Transpose matrix to cells x genes.
  - Assign GSM-prefixed real barcodes to obs_names.
  - Assign gene symbols from gene table column 1 to var_names.
  - Add sample-level metadata to obs.
  - Align common genes if required.
  - Concatenate samples.
  - Apply gene mapping and cleanup.
  - Merge duplicated gene symbols using sparse aggregation.
  - Validate X, obs and var.
  - Write standardized h5ad.
  - Delete raw downloaded files.

tool_design_implication:
  reusable_module_needed: src/tenx_mtx_standardizer.py
  secondary_module_needed: src/gene_mapping_and_deduplication.py
  additional_module_needed: src/metadata_checker.py
  reason: this case extends the 10x-like Matrix Market detector to support Cancer-only filtering and dot-separated role patterns

potential_risks:
  - Archive contains both cancer and non-malignant files.
  - Incorrect filtering could include unwanted sample types.
  - Matrix Market role names use dot-separated filename patterns.
  - Gene table is named genes.tsv.gz rather than features.tsv.gz.
  - Matrix files may be genes x cells and require transpose.
  - Barcodes must be read explicitly from barcodes.tsv.gz.
  - Duplicated gene symbols must be merged safely.
  - Manual metadata dictionary must match the filtered GSM files.
