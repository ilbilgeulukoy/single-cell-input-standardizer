raw_table_structure:
  file_extension: ".csv.gz"
  first_column_name: "Unnamed: 0"
  first_column_interpretation: ensembl_gene_id
  inferred_feature_identifier_type: ensembl_gene_id
  remaining_columns_interpretation: cell_barcodes_or_cell_ids
  preview_shape_first_file: "5 rows x 8951 columns"
  raw_orientation: genes_or_features_x_cells
  required_transpose_for_anndata: true

metadata_strategy:
  type: manually_curated_sample_level_metadata_from_GEO_and_article
  sample_id_source: GSM accession from filename
  patient_id_source: manual metadata dictionary
  metadata_expansion: sample-level metadata added to every cell in adata.obs
  selected_samples:
    GSM5514788: OMT-1_CD45_POS
    GSM5514789: OMT-1_CD45_NEG
    GSM5514790: OMT-3_CD45_POS
    GSM5514791: OMT-3_CD45_NEG
    GSM5514792: T1
    GSM5514794: T6_CD45_NEG

feature_identifier_strategy:
  required: true
  detected_identifier_type: ensembl_gene_id
  detection_rule: values in first column mostly start with ENSG
  mapping_key: dataset_gene_ensembl_id
  reusable_module_needed: src/feature_identifier_type_detector.py

gene_mapping_strategy:
  required: true
  mapping_key: dataset_gene_ensembl_id
  previous_custom_component: SampleGeneMapGenerator
  reusable_module_needed: src/gene_mapping_and_deduplication.py

gene_deduplication_strategy:
  required: true
  preferred_method: sparse_aggregation_matrix
  avoid_method: dense_pandas_toarray_groupby

standardization_recipe:
  - Download GSE181955_RAW.tar from GEO.
  - Extract temporary CSV files.
  - Detect GSM-level .csv.gz count tables.
  - Select only GSM files with curated metadata.
  - Report skipped GSM files without curated metadata.
  - Read each CSV table using pandas.
  - Rename first column to feature_id.
  - Detect first column as Ensembl gene IDs.
  - Set feature_id as dataframe index.
  - Transpose to cells x genes/features.
  - Add sample-level metadata to adata.obs.
  - Align common features across samples.
  - Concatenate samples.
  - Generate gene mapping table using dataset_gene_ensembl_id.
  - Add standardized gene metadata to adata.var.
  - Remove genes flagged as to_remove.
  - Aggregate duplicated gene symbols by summing counts.
  - Validate X, obs and var.
  - Write standardized h5ad.
  - Delete raw downloaded files.

tool_design_implication:
  reusable_module_needed: src/count_table_standardizer.py
  secondary_module_needed: src/feature_identifier_type_detector.py
  additional_module_needed: src/gene_mapping_and_deduplication.py
  metadata_module_needed: src/metadata_checker.py
  reason: this case extends CSV count table standardization to Ensembl-like feature IDs and selected-sample metadata filtering

potential_risks:
  - First column is named Unnamed: 0 and must be renamed.
  - First column contains Ensembl IDs, not gene symbols.
  - Incorrect mapping key can break gene metadata reconstruction.
  - Some GSM files are skipped because curated metadata is missing.
  - Matrix orientation must be transposed before AnnData creation.
  - Duplicate gene symbols may appear after Ensembl-to-symbol mapping.
  - var column to_remove should be dropped before final export if present.
