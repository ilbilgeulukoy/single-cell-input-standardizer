  first_column_name: "CellId"
  first_column_interpretation: cell_id
  remaining_columns_interpretation: gene_symbols
  preview_shape_first_file: "5 rows x 26365 columns"
  raw_orientation: cells_x_genes
  required_transpose_for_anndata: false

cell_id_strategy:
  required: true
  cell_id_column: CellId
  rule: use CellId column as obs_names and drop it from expression matrix before AnnData construction

feature_identifier_strategy:
  required: true
  detected_identifier_type: gene_symbol
  mapping_key: dataset_gene_symbol
  rule: remaining dataframe columns are gene symbols

metadata_strategy:
  type: manually_curated_sample_level_metadata_from_GEO_and_article_table
  sample_id_source: GSM accession from filename
  patient_id_source: manual metadata dictionary
  metadata_expansion: sample-level metadata added to every cell in adata.obs

gene_mapping_strategy:
  required: true
  mapping_key: dataset_gene_symbol
  previous_custom_component: SampleGeneMapGenerator
  reusable_module_needed: src/gene_mapping_and_deduplication.py

gene_deduplication_strategy:
  required: true
  preferred_method: sparse_aggregation_matrix
  avoid_method: dense_pandas_toarray_groupby

standardization_recipe:
  - Download GSE118828_RAW.tar from GEO.
  - Extract temporary CSV files.
  - Detect GSM-level .csv.gz count tables.
  - Select only GSM files with curated metadata.
  - Report skipped GSM files without curated metadata.
  - Read each CSV table using pandas.
  - Detect CellId column.
  - Use CellId values as obs_names.
  - Drop CellId from expression matrix.
  - Build AnnData directly with cells x genes matrix.
  - Do not transpose.
  - Assign remaining columns as var_names.
  - Add sample-level metadata to adata.obs.
  - Align common genes across samples.
  - Concatenate samples.
  - Generate gene mapping table using dataset_gene_symbol.
  - Add standardized gene metadata to adata.var.
  - Remove genes flagged as to_remove.
  - Aggregate duplicated gene symbols by summing counts.
  - Validate X, obs and var.
  - Write standardized h5ad.
  - Delete raw downloaded files.

tool_design_implication:
  reusable_module_needed: src/count_table_standardizer.py
  secondary_module_needed: src/orientation_detector.py
  additional_module_needed: src/gene_mapping_and_deduplication.py
  metadata_module_needed: src/metadata_checker.py
  reason: this case extends CSV count table standardization to CellId-based cell-by-gene matrices that do not require transposition

potential_risks:
  - CellId column must not be treated as a gene.
  - Matrix should not be transposed.
  - Some GSM files are skipped because curated metadata is missing.
  - Gene columns are gene symbols and should use dataset_gene_symbol mapping.
  - Duplicate gene symbols may appear after mapping.
  - Manual metadata dictionary must match selected GSM files.
