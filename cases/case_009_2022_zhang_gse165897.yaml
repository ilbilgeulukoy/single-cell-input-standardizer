gene_deduplication_strategy:
  required: true
  preferred_method: sparse_aggregation_matrix
  avoid_method: dense_pandas_toarray_groupby

standardization_recipe:
  - Download global UMI count matrix and cell metadata table from GEO.
  - Read count matrix as tab-separated compressed table.
  - Treat first column as gene symbols.
  - Treat remaining columns as cell IDs.
  - Transpose count matrix to cells x genes.
  - Create AnnData from the transposed matrix.
  - Assign obs_names from count matrix cell columns.
  - Assign var_names from gene symbol column.
  - Read cell metadata table.
  - Join metadata to AnnData obs using exact cell IDs.
  - Parse sample_id from metadata sample column.
  - Map parsed sample_id to GSM ID using curated dictionary.
  - Merge curated sample-level metadata into obs.
  - Generate gene mapping table using dataset_gene_symbol.
  - Add standardized gene metadata to var.
  - Remove genes flagged as to_remove.
  - Aggregate duplicated gene symbols using sparse aggregation.
  - Convert object obs columns to string before export.
  - Validate X, obs and var.
  - Write standardized h5ad.
  - Delete raw downloaded files.

tool_design_implication:
  reusable_module_needed: src/global_matrix_metadata_standardizer.py
  metadata_join_module_needed: src/cell_metadata_joiner.py
  sample_parser_module_needed: src/sample_id_parser.py
  gene_mapping_module_needed: src/gene_mapping_and_deduplication.py
  reason: this case introduces a global UMI matrix plus separate cellInfo metadata table, requiring exact cell-ID metadata join and sample parsing

potential_risks:
  - Count matrix must be transposed before AnnData creation.
  - Cell IDs must match exactly between matrix columns and metadata cell column.
  - Metadata merge can silently reorder cells if not indexed correctly.
  - sample_id must be parsed from the metadata sample column, not from filename.
  - Parsed sample IDs must be mapped to GSM IDs through a curated dictionary.
  - Object columns in obs should be converted to string before h5ad export.
  - Duplicate gene symbols may appear after gene mapping.
