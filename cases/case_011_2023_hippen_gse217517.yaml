file_matching_strategy:
  required: true
  correct_rule: match matrix, features, and barcodes by GSM prefix
  incorrect_rule_detected_in_original_script: selecting first available matrix/features/barcodes file for every GSM
  critical_warning: do_not_reuse_the_first_triplet_for_all_samples
  reusable_module_needed: src/tenx_mtx_standardizer.py

modality_filtering_strategy:
  required: true
  keep:
    - files containing "_single_cell_" but not "_pooled_single_cell_"
    - GSM6720925 to GSM6720932
  exclude:
    - pooled single-cell triplets
    - bulk_chunk_ribo STAR tables
    - bulk_dissociated_ribo STAR tables
    - bulk_dissociated_polyA STAR tables
  reusable_module_needed: src/modality_filter.py

gene_mapping_strategy:
  required: true
  mapping_key: dataset_gene_symbol
  gene_ensembl_id_available: true
  gene_symbol_available: true
  feature_type_available: true
  reusable_module_needed: src/gene_mapping_and_deduplication.py

gene_deduplication_strategy:
  required: true
  duplicated_gene_symbols_detected: true
  duplicated_gene_symbols_first_sample: 10
  preferred_method: sparse_aggregation_matrix
  avoid_method: dense_pandas_toarray_groupby

standardization_recipe:
  - Download GSE217517_RAW.tar temporarily.
  - Extract all supplementary files.
  - Detect mixed archive content.
  - Keep only per-sample single-cell Matrix Market triplets for GSM6720925 to GSM6720932.
  - Exclude pooled single-cell triplets.
  - Exclude bulk RNA-seq STAR tables.
  - Match matrix, features, and barcodes by GSM prefix.
  - Read each matrix.mtx.gz.
  - Transpose from genes x cells to cells x genes.
  - Read barcodes explicitly.
  - Prefix obs_names with GSM accession to avoid barcode collisions.
  - Read feature table and use gene symbol column as var_names.
  - Attach curated sample-level metadata.
  - Concatenate selected AnnData objects.
  - Keep common genes if required by project policy.
  - Generate gene mapping table using dataset_gene_symbol.
  - Remove genes flagged as to_remove.
  - Aggregate duplicated gene symbols using sparse aggregation.
  - Validate X, obs, var, sample counts and NaN status.
  - Write standardized h5ad.
  - Remove raw downloaded files.

tool_design_implication:
  reusable_module_needed: src/tenx_mtx_standardizer.py
  modality_filter_module_needed: src/modality_filter.py
  metadata_checker_needed: src/metadata_checker.py
  reason: this case introduces a mixed GEO archive where per-sample single-cell triplets must be separated from pooled single-cell and bulk RNA-seq files

potential_risks:
  - GEO archive contains multiple modalities.
  - Pooled single-cell triplets should not be mixed with selected per-sample triplets unless explicitly requested.
  - Bulk RNA-seq STAR tables should not be parsed as single-cell data.
  - Matrix/features/barcodes must be matched by GSM prefix.
  - Original script risks reusing the first triplet for all GSM samples.
  - Barcode collisions are possible if GSM prefix is not added.
  - Duplicate gene symbols require sparse aggregation.
