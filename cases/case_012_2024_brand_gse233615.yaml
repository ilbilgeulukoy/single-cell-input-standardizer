gene_universe_strategy:
  required: true
  unique_gene_counts_detected:
    - 33538
    - 36601
  warning: one sample has a smaller gene universe than the other eight samples
  recommended_policy: harmonize_genes_before_or_after_concatenation
  possible_methods:
    - common_gene_intersection
    - outer_join_then_gene_mapping
  original_script_policy: common_gene_intersection_before_concatenation

gene_mapping_strategy:
  required: true
  mapping_key: dataset_gene_symbol
  gene_ensembl_id_available: true
  gene_symbol_available: true
  feature_type_available: true
  reusable_module_needed: src/gene_mapping_and_deduplication.py

gene_deduplication_strategy:
  required: true
  duplicated_feature_names_detected: true
  duplicated_feature_names_range: "10 to 24 per sample"
  preferred_method: sparse_aggregation_matrix
  avoid_method: dense_pandas_toarray_groupby

standardization_recipe:
  - Download GSE233615_RAW.tar temporarily.
  - Extract 9 per-sample filtered_feature_bc_matrix.h5 files.
  - Validate that all detected GSMs exist in curated metadata.
  - Validate that filename patient tokens match curated patient IDs.
  - Read each h5 file with scanpy.read_10x_h5 during final processing.
  - Use h5py-only inspection when scanpy is unavailable.
  - Prefix obs_names with GSM accession if needed to avoid barcode collisions.
  - Add curated sample-level metadata to obs.
  - Validate gene universe differences across samples.
  - Apply common-gene intersection or another explicit harmonization policy.
  - Concatenate selected AnnData objects.
  - Generate gene mapping table using dataset_gene_symbol.
  - Remove genes flagged as to_remove.
  - Aggregate duplicated gene symbols using sparse aggregation.
  - Convert metastasis_site to string before h5ad write if needed.
  - Drop to_remove from final var table if present.
  - Validate X, obs, var, sample counts and NaN status.
  - Write standardized h5ad.
  - Remove raw downloaded files.

tool_design_implication:
  reusable_module_needed: src/tenx_h5_standardizer.py
  metadata_checker_needed: src/metadata_checker.py
  gene_harmonization_needed: src/gene_universe_harmonizer.py
  gene_mapping_needed: src/gene_mapping_and_deduplication.py
  reason: this case introduces per-sample 10x h5 files with consistent metadata matching but different gene universe sizes across samples

potential_risks:
  - scanpy may not be installed in lightweight inspection environments.
  - h5py-only inspection should be available for read-only format detection.
  - One sample has fewer genes than the others.
  - Duplicate gene names require sparse aggregation.
  - Barcode collisions are possible if sample prefixes are not added.
  - Patient ID must be validated from both filename and curated dictionary.
  - Tumor grade includes both LGSC and HGSC, so grade must remain sample-specific.
