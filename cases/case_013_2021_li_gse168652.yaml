  nested_tar_files_detected: 2
  selected_nested_tar: GSM5155196_Tumor.tar.gz
  excluded_nested_tar:
    - GSM5155197_Normal.tar.gz
  raw_files_removed_after_inspection: 6
  raw_directories_removed_after_inspection: 1

detected_input_format:
  format_label: nested_tar_single_sample_10x_matrix_market_triplet
  nested_archive_required: true
  standard_10x_matrix_market: true
  standard_10x_h5: false
  custom_count_table: false
  single_sample_triplet: true
  tumor_only_selected: true
  normal_sample_present_but_excluded: true
  raw_orientation: genes_x_cells_before_transpose
  transpose_required_for_anndata: true

