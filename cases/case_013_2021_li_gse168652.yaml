    - AAACCCACAAATACAG-1
    - AAACCCACAAGCACAG-1
  recommended_obs_name_rule: prefix_barcodes_with_gsm_id

metadata_from_original_script:
  gsm_id: GSM5155196
  patient_id: N_OT_PT1
  dataset_id: GSE168652
  cancer_type: Ovarian
  tumor_site: Metastasis
  metastasis_site: Omentum
  tumor_treatment: No
  cancer_site_origin: Omentum
  tumour_grade: SCC
  tumour_stage: IIIc
  histological_subtype: Serous
  patient_ethnicity: Unknown

metadata_sanity_check:
  required: true
  status: failed
  geo_context_expected_disease: cervical cancer
  geo_context_expected_histology: cervical squamous cell carcinoma
  warnings:
    - cancer_type in original script is Ovarian but GEO context is cervical cancer
    - histological_subtype Serous conflicts with cervical squamous cell carcinoma context
    - tumor_site Metastasis and metastasis_site Omentum look ovarian-style and conflict with GEO cervical tumor context
  recommended_policy:
    - do_not_silently_reuse_ovarian_metadata_defaults
    - flag_dataset_as_non_ovarian_if_project_scope_is_ovarian_only
    - if_used_for_format_testing_mark_biological_metadata_as_needs_correction
  reusable_module_needed: src/metadata_sanity_checker.py

scope_filtering_strategy:
  required: true
  project_scope: ovarian_cancer
  dataset_scope_status: likely_out_of_scope
  reason: GEO context describes cervical cancer rather than ovarian cancer
  possible_actions:
    - exclude_from_biological_ovarian_analysis
    - keep_as_format_test_case_only
    - keep_as_negative_control_for_metadata_sanity_checker
  reusable_module_needed: src/project_scope_filter.py

gene_mapping_strategy:
  required: true
  mapping_key: dataset_gene_symbol
  gene_ensembl_id_available: true
  gene_symbol_available: true
  feature_type_available: true
  reusable_module_needed: src/gene_mapping_and_deduplication.py

gene_deduplication_strategy:
  required: true
  duplicated_gene_symbols_detected: true
  duplicated_gene_symbols: 34
  preferred_method: sparse_aggregation_matrix
  avoid_method: dense_pandas_toarray_groupby

original_script_issues:
  - curated biological metadata conflicts with GEO disease context
  - normal sample exists but is not used
  - np.isnan check references adata_combined although only adata exists in this single-sample script
  - df_var duplicate handling is manually patched with drop_duplicates
  - this case should not be treated as valid ovarian cohort data without metadata correction

standardization_recipe:
  - Download GSE168652_RAW.tar.
  - Extract top-level archive.
  - Detect nested GSM-level tar.gz files.
  - Select GSM5155196_Tumor.tar.gz for tumor sample inspection.
  - Extract nested Tumor directory.
  - Detect matrix.mtx.gz, features.tsv.gz and barcodes.tsv.gz.
  - Read Matrix Market matrix.
  - Transpose from genes x cells to cells x genes.
  - Read barcodes explicitly.
  - Prefix obs_names with GSM accession.
  - Read feature table and use gene symbol column.
  - Run biological metadata sanity check before accepting curated metadata.
  - If project is ovarian-only, mark dataset as out-of-scope or format-test-only.
  - If retained, correct metadata to cervical cancer context.
  - Generate gene mapping table using dataset_gene_symbol.
  - Remove genes flagged as to_remove.
  - Aggregate duplicated gene symbols using sparse aggregation.
  - Validate output.
  - Write h5ad only after metadata scope decision.
  - Remove raw files.

tool_design_implication:
  reusable_module_needed: src/nested_archive_extractor.py
  tenx_module_needed: src/tenx_mtx_standardizer.py
  metadata_sanity_module_needed: src/metadata_sanity_checker.py
  project_scope_module_needed: src/project_scope_filter.py
  gene_mapping_module_needed: src/gene_mapping_and_deduplication.py
  reason: this case introduces nested GSM tar archives and demonstrates that biological metadata can be inconsistent with GEO context

potential_risks:
  - Nested tar.gz archives require a second extraction step.
  - Normal and tumor samples are both present but only tumor is selected.
  - Curated metadata may be copied from ovarian defaults and be biologically wrong.
  - Format parsing can succeed while biological metadata fails.
  - This dataset may be out-of-scope for an ovarian-only cohort.
  - Duplicate gene symbols require sparse aggregation.
  - Single-sample script should not reference adata_combined.
