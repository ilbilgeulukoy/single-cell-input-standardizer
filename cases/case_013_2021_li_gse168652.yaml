  raw_archive: GSE168652_RAW.tar
  raw_url: "https://www.ncbi.nlm.nih.gov/geo/download/?acc=GSE168652&format=file"
  recommended_processing_mode: local_temporary_download
  raw_file_policy: download_extract_nested_archive_inspect_then_delete_raw_files

raw_archive_summary:
