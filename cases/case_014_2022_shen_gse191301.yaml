original_script_issues:
  - variable gsm is used before definition in the first exploratory adata.obs_names assignment
  - loop recomputes file lists but selects mtx_files[0], feat_files[0], bc_files[0]
  - this risks assigning the first triplet to every GSM sample
  - correct logic must select files by current GSM prefix
  - file pattern detector should not be overly strict about dot versus underscore naming variants

standardization_recipe:
  - Download GSE191301_RAW.tar temporarily.
  - Extract all supplementary files.
  - Detect 6 per-sample Matrix Market triplets.
  - Validate all detected GSMs against curated sample metadata.
  - Match matrix, features and barcodes by GSM prefix.
  - Read each matrix.mtx.gz.
  - Transpose from genes x cells to cells x genes.
  - Read barcodes explicitly.
  - Prefix obs_names with GSM accession to avoid barcode collisions.
  - Read feature table and use gene symbol column as var_names.
  - Attach curated sample-level metadata.
  - Validate pre/post NACT metadata consistency.
  - Concatenate selected AnnData objects.
  - Generate gene mapping table using dataset_gene_symbol.
  - Remove genes flagged as to_remove.
  - Aggregate duplicated gene symbols using sparse aggregation.
  - Validate X, obs, var, sample counts and NaN status.
  - Write standardized h5ad.
  - Remove raw downloaded files.

tool_design_implication:
  reusable_module_needed: src/tenx_mtx_standardizer.py
  metadata_checker_needed: src/metadata_checker.py
  file_pattern_detector_needed: src/file_pattern_detector.py
  gene_mapping_needed: src/gene_mapping_and_deduplication.py
  reason: this case reinforces GSM-prefix triplet matching and introduces pre/post NACT metadata validation

potential_risks:
  - First-triplet reuse bug can silently duplicate one sample across all GSMs.
  - Barcode collisions are possible without GSM prefixing.
  - Pre/Post treatment metadata must be validated.
  - Matrix/features/barcodes must be matched by GSM prefix.
  - Duplicate gene symbols require sparse aggregation.
  - Detector should support Matrix Market naming variations.
