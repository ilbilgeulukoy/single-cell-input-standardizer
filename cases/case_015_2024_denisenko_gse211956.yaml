metadata_strategy:
  curated_sample_metadata_required: true
  metadata_level: sample_level
  external_cell_metadata_available: false
  dataset_id: GSE211956
  cancer_type: Ovarian
  tumor_site: Primary
  metastasis_site: Unknown
  tumor_treatment: Yes
  cancer_site_origin: Unknown
  tumour_grade: HGSC
  tumour_stage: III-IV
  histological_subtype: Serous
  patient_ethnicity: Unknown
  patient_id_source: filename_third_token
  patient_token_validation: required

modality_filtering_strategy:
  required: true
  keep:
    - GSM6506105_counts_Y2.txt.gz
    - GSM6506106_counts_Y3.txt.gz
    - GSM6506107_counts_Y5.txt.gz
    - GSM6506108_counts_MJ10.txt.gz
    - GSM6506109_counts_MJ11.txt.gz
  exclude:
    - spatial Visium Matrix Market files
    - spatial.zip files
  reusable_module_needed: src/modality_filter.py

gene_mapping_strategy:
  required: true
  mapping_key: dataset_gene_symbol
  gene_symbols_from_row_index: true
  reusable_module_needed: src/gene_mapping_and_deduplication.py

gene_harmonization_strategy:
  required: true
  original_script_policy: common_gene_intersection_before_concatenation
  unique_gene_counts_detected:
    - 19915
  note: all selected scRNA-seq count tables share the same detected gene count

validation_strategy:
  required: true
  sparse_safe_nan_check: true
  avoid_dense_nan_check_for_large_matrices: true
  note: dense np.isnan on concatenated matrix may be memory-heavy

original_script_issues:
  - gzip -dk creates uncompressed txt files but script still reads txt.gz files
  - decompression step is unnecessary and increases disk usage
  - sc.read_text(fp).T indicates genes x cells input orientation
  - NaN check before concatenation only checks the last adata object from the loop
  - dense np.isnan on adata_combined.X may be memory-heavy
  - gene mapping files are generated in directory_input rather than directory_annotated
  - final last-check section inspects adata inconsistently after writing new_adata

standardization_recipe:
  - Download GSE211956_RAW.tar temporarily.
  - Extract all supplementary files.
  - Detect mixed scRNA-seq and spatial transcriptomics archive.
  - Select only GSM6506105-GSM6506109 compressed TXT count tables for scRNA-seq processing.
  - Exclude GSM6506110-GSM6506117 spatial Visium files.
  - Read .txt.gz count tables directly without gzip decompression.
  - Treat rows/index as genes and columns as cells.
  - Transpose from genes x cells to cells x genes.
  - Preserve cell barcode column names as obs_names.
  - Prefix obs_names with GSM accession if needed to avoid barcode collisions.
  - Add curated sample-level metadata.
  - Validate filename patient token against curated patient_id.
  - Harmonize common genes across selected samples.
  - Concatenate selected AnnData objects.
  - Generate gene mapping table using dataset_gene_symbol.
  - Remove genes flagged as to_remove.
  - Aggregate duplicated gene symbols using sparse aggregation.
  - Use sparse-safe NaN validation.
  - Write standardized h5ad.
  - Remove raw downloaded files.

tool_design_implication:
  reusable_module_needed: src/count_table_standardizer.py
  modality_filter_module_needed: src/modality_filter.py
  data_size_policy_needed: src/data_size_policy.py
  metadata_checker_needed: src/metadata_checker.py
  validation_module_needed: src/validation.py
  gene_mapping_needed: src/gene_mapping_and_deduplication.py
  reason: this case introduces compressed TXT gene-by-cell scRNA-seq count tables inside a mixed scRNA-seq plus spatial archive

potential_risks:
  - Mixed archive contains both scRNA-seq and spatial transcriptomics files.
  - Spatial Visium files should not be processed as selected scRNA-seq samples.
  - Unnecessary decompression can inflate disk usage.
  - TXT files use gene symbols as row index rather than explicit gene column.
  - Orientation detector must handle index-based gene identifiers.
  - Cell barcode collisions are possible without sample prefixing.
  - Dense NaN checks can be memory-heavy.
