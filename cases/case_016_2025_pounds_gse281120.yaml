metadata_strategy:
  curated_sample_metadata_required: true
  metadata_level: sample_level
  external_cell_metadata_available: false
  dataset_id: GSE281120
  cancer_type: Ovarian
  tumor_site: Metastasis
  metastasis_site: Omentum
  cancer_site_origin: Unknown
  tumour_grade: HGSC
  tumour_stage: Unknown
  histological_subtype: Serous
  patient_ethnicity: Unknown
  sample_specific_fields:
    - patient_id
    - tumor_treatment
    - sample_suffix

sample_id_parsing_strategy:
  required: true
  parser_input: cell_barcode
  parser_rule: split_cell_name_on_underscore_and_take_last_token
  quote_cleanup_required: true
  quote_cleanup_rule: strip leading and trailing double quotes before suffix parsing
  missing_suffixes_by_design:
    - "4"
  excluded_suffixes_by_design:
    - "5"
  reusable_module_needed: src/sample_id_parser.py

normal_sample_filtering_strategy:
  required: true
  filter_rule: remove sample_suffix == "5"
  reason: normal/non-metastasis sample should not enter tumor cohort
  reusable_module_needed: src/cohort_filter.py

gene_mapping_strategy:
  required: true
  mapping_key: dataset_gene_symbol
  gene_symbols_from_first_column: true
  reusable_module_needed: src/gene_mapping_and_deduplication.py

data_size_policy:
  required: true
  file_size_mb: 733.99
  risk: dense global CSV read may require substantial memory
  recommended_policy:
    - inspect_header_before_full_read
    - avoid_unnecessary_decompression
    - consider_chunked_reading_for_validation
    - warn_before_dense_AnnData_construction

original_script_issues:
  - downloads GSE281120_counts.csv.gz but searches for a .csv file
  - list_abspath_sample is used for gzip decompression but is not defined
  - decompression is unnecessary because pandas can read csv.gz directly
  - this is one global matrix, not per-GSM files
  - sample identity must be parsed from cell barcode suffix
  - suffix 5 normal/non-metastasis sample must be excluded
  - quoted CSV headers can break naive suffix parsing
  - dense AnnData construction from a 734 MB CSV may be memory-heavy

standardization_recipe:
  - Download GSE281120_counts.csv.gz temporarily.
  - Inspect header without full dense read.
  - Read compressed CSV directly without gzip decompression.
  - Treat first column as gene symbols.
  - Treat remaining columns as cell barcodes.
  - Strip quotes from cell barcode names if present.
  - Parse sample_suffix from cell barcode after the final underscore.
  - Remove cells with sample_suffix 5.
  - Map remaining suffixes to GSM accessions.
  - Add curated sample-level metadata based on GSM accession.
  - Transpose genes x cells to cells x genes.
  - Validate final selected cell counts per suffix.
  - Generate gene mapping table using dataset_gene_symbol.
  - Remove genes flagged as to_remove.
  - Aggregate duplicated gene symbols using sparse aggregation.
  - Validate X, obs and var with memory-safe checks.
  - Write standardized h5ad.
  - Remove raw downloaded file.

tool_design_implication:
  reusable_module_needed: src/global_matrix_metadata_standardizer.py
  sample_parser_needed: src/sample_id_parser.py
  cohort_filter_needed: src/cohort_filter.py
  data_size_policy_needed: src/data_size_policy.py
  count_table_module_needed: src/count_table_standardizer.py
  gene_mapping_needed: src/gene_mapping_and_deduplication.py
  reason: this case introduces a large single global CSV matrix where sample identity is encoded only in cell barcode suffixes

potential_risks:
  - sample identity can be lost if barcode suffixes are not parsed
  - quoted CSV headers can create suffixes like 1" instead of 1
  - normal sample suffix 5 can contaminate tumor cohort if not removed
  - dense reading of a 734 MB compressed CSV may be memory-heavy
  - no per-sample files are available, so metadata must be assigned after parsing cell names
