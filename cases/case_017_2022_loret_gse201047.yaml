filename_token_strategy:
  pattern: "GSM{accession}_{order}_{N_or_T}_{site}_{PT}_filtered_gene_bc_matrices_h5.h5"
  examples:
    - GSM6049610_1_N_OT_PT1_filtered_gene_bc_matrices_h5.h5
    - GSM6049628_19_T_OT_PT3_filtered_gene_bc_matrices_h5.h5
  token_meanings:
    token_0: GSM accession
    token_1: numeric sample order
    token_2: N_or_T_label
    token_3: anatomical_site_code
    token_4: patient_code
  note: original script parses token_4 as patient_id but does not use it; curated patient_id carries the full N/T/site/PT label

metadata_strategy:
  curated_sample_metadata_required: true
  metadata_level: sample_level
  external_cell_metadata_available: false
  dataset_id: GSE201047
  cancer_type: Ovarian
  tumour_grade: HGSC
  histological_subtype: Serous
  patient_ethnicity: Unknown
  sample_specific_fields:
    - patient_id
    - tumor_site
    - metastasis_site
    - tumor_treatment
    - cancer_site_origin
    - tumour_stage

metadata_validation_strategy:
  required: true
  checks:
    - all detected GSMs must exist in curated metadata
    - filename N/T token should be consistent with tumor_treatment
    - filename anatomical site token should be consistent with metastasis_site
    - filename PT token should be consistent with curated patient_id
    - stage should remain sample-specific
  reusable_module_needed: src/metadata_checker.py

sample_id_parsing_strategy:
  required: true
  patient_id_label_contains:
    - N_or_T_label
    - anatomical_site_code
    - patient_code
  example_labels:
    - N_OT_PT1
    - T_PER_PT3
  reusable_module_needed: src/sample_id_parser.py

gene_mapping_strategy:
  required: true
  mapping_key: dataset_gene_symbol
  gene_ensembl_id_available: true
  gene_symbol_available: true
  gene_symbols_from_old_h5_gene_names: true
  reusable_module_needed: src/gene_mapping_and_deduplication.py

gene_deduplication_strategy:
  required: true
  duplicated_gene_names_detected: true
  duplicated_gene_names_per_sample: 95
  preferred_method: sparse_aggregation_matrix
  avoid_method: dense_pandas_toarray_groupby

standardization_recipe:
  - Download GSE201047_RAW.tar temporarily.
  - Extract 22 per-sample h5 files.
  - Validate all detected GSMs against curated metadata.
  - Detect h5 layout.
  - If /matrix exists, process modern 10x h5 v3 layout.
  - If /matrix does not exist, detect genome group such as /hg19.
  - Read old 10x h5 v2 keys from /hg19.
  - Extract barcodes, genes, gene_names, data, indices, indptr and shape.
  - Interpret raw matrix as genes x cells.
  - Read each sample with scanpy.read_10x_h5 during final processing.
  - Prefix obs_names with GSM accession before concatenation to avoid barcode collisions.
  - Add curated multi-site sample-level metadata.
  - Validate N/T, site and PT tokens against metadata.
  - Harmonize common genes if needed.
  - Concatenate all AnnData objects.
  - Generate gene mapping table using dataset_gene_symbol.
  - Remove genes flagged as to_remove.
  - Aggregate duplicated gene symbols using sparse aggregation.
  - Convert metastasis_site to string before writing if needed.
  - Drop to_remove from final var if present.
  - Validate X, obs, var, sample counts and NaN status using sparse-safe checks.
  - Write standardized h5ad.
  - Remove raw downloaded files.

tool_design_implication:
  reusable_module_needed: src/tenx_h5_standardizer.py
  old_h5_layout_support_needed: true
  metadata_checker_needed: src/metadata_checker.py
  sample_parser_needed: src/sample_id_parser.py
  validation_module_needed: src/validation.py
  gene_mapping_needed: src/gene_mapping_and_deduplication.py
  reason: this case introduces old 10x h5 genome-group layout and rich multi-site sample metadata

original_script_issues:
  - df.isna() is called but df is not defined
  - patient_id is parsed from filename token split('_')[4] but this parsed variable is not used
  - obs_names are not explicitly prefixed by GSM before concatenation
  - dense np.isnan on adata_combined.X may be memory-heavy or invalid for sparse matrices
  - metadata has multiple dimensions and needs validation against filename tokens

potential_risks:
  - h5 files use old /hg19 genome-group layout rather than modern /matrix layout
  - barcode collisions are possible without GSM prefixing
  - duplicated gene names require sparse aggregation
  - N/T/site/PT labels can be mis-parsed if filename token logic is too brittle
  - dense NaN checks can fail or become memory-heavy
